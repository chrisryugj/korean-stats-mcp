# Korean Stats MCP — Fly.io 배포 구성
#
# 자치구 .xlsx 파싱(kordoc + sharp + onnxruntime) 의존성이 큰 탓에
# Vercel 250MB 한도가 안 맞아 Fly.io 컨테이너로 배포.

app = 'korean-stats-mcp'
primary_region = 'nrt'  # Tokyo. icn(Seoul)은 일반 plan 미지원. nrt가 sin보다 KOSIS 레이턴시 ~50ms 빠름 (2026-05-20 양 리전 10회 비교 검증). cold-path ECONNRESET은 양 리전 공통 현상 — client.ts retry로 흡수.

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  RATE_LIMIT_RPM = '300'
  TRUST_PROXY = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'  # suspend는 proxy가 안 재우는 증상 실측(2026-07-02) — korean-law-mcp/docs/FLY-COST.md
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'  # kordoc + sharp 동작에 256MB는 빠듯
  cpu_kind = 'shared'
  cpus = 1
